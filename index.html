<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO RP - Forum</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1d26;
            --bg-card: #242834;
            --bg-card-hover: #2d3240;
            --accent-blue: #3b82f6;
            --accent-electric: #00d4ff;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            
            /* Role Colors */
            --role-helper: #8b5cf6;
            --role-kichik-mod: #06b6d4;
            --role-moderator: #10b981;
            --role-katta-mod: #f59e0b;
            --role-admin: #ef4444;
            --role-davlat-nazorat: #1e40af;
            --role-jinoiy-nazorat: #7c2d12;
            --role-helper-nazorat: #0891b2;
            --role-bosh-nazorat-orni: #dc2626;
            --role-bosh-nazorat: #991b1b;
            --role-texnik-admin: #6366f1;
            --role-admin-kurator: #be185d;
            --role-bosh-admin-orni: #9f1239;
            --role-bosh-admin: #881337;
            --role-dasturchi: #ec4899;
            --role-loyiha-jamoa: #14b8a6;
            --role-asoschi-orni: #f97316;
            --role-asoschi: #dc2626;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: rgba(26, 29, 38, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-btn, .header-icon {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .menu-btn:hover, .header-icon:hover {
            color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.1);
        }

        .logo {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Side Menu */
        .side-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100vh;
            background-color: var(--bg-card);
            z-index: 1001;
            transition: left 0.3s ease;
            overflow-y: auto;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .side-menu.open {
            left: 0;
        }

        .side-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .side-menu-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .side-menu-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .side-menu-user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-electric));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            position: relative;
            overflow: hidden;
        }

        .side-menu-user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .side-menu-user-info h3 {
            font-size: 16px;
            margin-bottom: 2px;
        }

        .side-menu-user-info .role-badge {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-block;
        }

        .side-menu-nav {
            padding: 10px 0;
        }

        .side-menu-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .side-menu-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .side-menu-item i {
            width: 20px;
            text-align: center;
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 120px;
        }

        /* Auth Forms */
        .auth-container {
            max-width: 400px;
            margin: 40px auto;
            padding: 30px;
            background-color: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }

        .auth-title {
            text-align: center;
            margin-bottom: 24px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--bg-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-electric));
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: var(--bg-primary);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
        }

        .auth-switch a {
            color: var(--accent-electric);
            text-decoration: none;
            cursor: pointer;
        }

        /* Category Section */
        .category-section {
            margin-bottom: 30px;
        }

        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--accent-blue);
        }

        .category-title {
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .category-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Forum Cards */
        .forum-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .forum-card:hover {
            background-color: var(--bg-card-hover);
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }

        .forum-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .forum-icon {
            width: 40px;
            height: 40px;
            background-color: rgba(59, 130, 246, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-electric);
            border: 2px solid rgba(59, 130, 246, 0.3);
        }

        .forum-title-section {
            flex: 1;
        }

        .forum-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .forum-meta {
            font-size: 13px;
            color: var(--text-muted);
        }

        .forum-meta span {
            color: var(--accent-electric);
            font-weight: 600;
        }

        .last-post-preview {
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 10px 12px;
            margin-top: 10px;
            font-size: 13px;
        }

        .last-post-title {
            color: var(--text-secondary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .last-post-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 12px;
        }

        /* Badges */
        .badge {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-ochiq {
            background-color: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-yopiq {
            background-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .badge-muhim {
            background-color: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-rad-etildi {
            background-color: rgba(107, 114, 128, 0.2);
            color: #6b7280;
            border: 1px solid rgba(107, 114, 128, 0.3);
        }

        /* Role Badges */
        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 5px currentColor; }
            to { box-shadow: 0 0 15px currentColor; }
        }

        .role-helper { background-color: rgba(139, 92, 246, 0.2); color: #8b5cf6; }
        .role-kichik-mod { background-color: rgba(6, 182, 212, 0.2); color: #06b6d4; }
        .role-moderator { background-color: rgba(16, 185, 129, 0.2); color: #10b981; }
        .role-katta-mod { background-color: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .role-admin { background-color: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .role-davlat-nazorat { background-color: rgba(30, 64, 175, 0.2); color: #60a5fa; }
        .role-jinoiy-nazorat { background-color: rgba(124, 45, 18, 0.2); color: #fb923c; }
        .role-helper-nazorat { background-color: rgba(8, 145, 178, 0.2); color: #22d3ee; }
        .role-bosh-nazorat-orni { background-color: rgba(220, 38, 38, 0.2); color: #f87171; }
        .role-bosh-nazorat { background-color: rgba(153, 27, 27, 0.2); color: #fca5a5; }
        .role-texnik-admin { background-color: rgba(99, 102, 241, 0.2); color: #818cf8; }
        .role-admin-kurator { background-color: rgba(190, 24, 93, 0.2); color: #f472b6; }
        .role-bosh-admin-orni { background-color: rgba(159, 18, 57, 0.2); color: #fb7185; }
        .role-bosh-admin { background-color: rgba(136, 19, 55, 0.2); color: #fda4af; }
        .role-dasturchi { background-color: rgba(236, 72, 153, 0.2); color: #f9a8d4; }
        .role-loyiha-jamoa { background-color: rgba(20, 184, 166, 0.2); color: #5eead4; }
        .role-asoschi-orni { background-color: rgba(249, 115, 22, 0.2); color: #fdba74; }
        .role-asoschi { background-color: rgba(220, 38, 38, 0.2); color: #f87171; }

        /* Topic List */
        .topic-list {
            background-color: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
        }

        .topic-item {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topic-item:last-child {
            border-bottom: none;
        }

        .topic-item:hover {
            background-color: var(--bg-card-hover);
        }

        .topic-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .topic-status.ochiq { background-color: #10b981; box-shadow: 0 0 8px #10b981; }
        .topic-status.yopiq { background-color: #ef4444; }
        .topic-status.muhim { background-color: #f59e0b; box-shadow: 0 0 8px #f59e0b; }

        .topic-info {
            flex: 1;
        }

        .topic-title {
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .topic-meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        .topic-stats {
            text-align: right;
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* Topic Detail */
        .topic-detail {
            background-color: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
        }

        .topic-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .topic-header-title {
            font-size: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .topic-header-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .post {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 16px;
        }

        .post:last-child {
            border-bottom: none;
        }

        .post-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-electric));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
        }

        .post-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-content {
            flex: 1;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .post-author {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .post-author.glowing {
            animation: textGlow 2s ease-in-out infinite alternate;
        }

        @keyframes textGlow {
            from { text-shadow: 0 0 5px currentColor; }
            to { text-shadow: 0 0 15px currentColor, 0 0 25px currentColor; }
        }

        .post-time {
            color: var(--text-muted);
            font-size: 13px;
        }

        .post-number {
            margin-left: auto;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
        }

        .post-body {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 12px;
        }

        .post-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .post-action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }

        .post-action-btn:hover {
            color: var(--accent-electric);
        }

        .reactions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .reaction {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 4px 10px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .reaction:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .reaction.active {
            background-color: rgba(59, 130, 246, 0.2);
            border-color: var(--accent-blue);
        }

        /* Reply Box */
        .reply-box {
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .reply-box.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .reply-box.disabled::after {
            content: "Bu mavzuga yozish o'chirilgan";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-primary);
            font-weight: 600;
        }

        .reply-textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            background-color: var(--bg-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-primary);
            resize: vertical;
            margin-bottom: 12px;
        }

        .reply-textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        /* Profile Page */
        .profile-header {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .profile-avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-electric));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto;
            overflow: hidden;
            border: 4px solid var(--bg-card);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
            transition: transform 0.3s;
        }

        .profile-avatar:hover {
            transform: scale(1.05);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-upload {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 36px;
            height: 36px;
            background-color: var(--accent-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 3px solid var(--bg-card);
            transition: all 0.2s;
        }

        .avatar-upload:hover {
            transform: scale(1.1);
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .profile-role {
            margin-bottom: 16px;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .profile-stat {
            text-align: center;
        }

        .profile-stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-electric);
        }

        .profile-stat-label {
            font-size: 13px;
            color: var(--text-muted);
        }

        .profile-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
            text-align: left;
        }

        .profile-info-item {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 8px;
        }

        .profile-info-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .profile-info-value {
            font-size: 14px;
            color: var(--text-primary);
        }

        /* Admin Panel */
        .admin-panel {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
        }

        .admin-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 16px;
            overflow-x: auto;
        }

        .admin-tab {
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .admin-tab:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .admin-tab.active {
            background-color: var(--accent-blue);
            color: white;
        }

        .admin-section {
            display: none;
        }

        .admin-section.active {
            display: block;
        }

        .admin-section-title {
            font-size: 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 40px;
            background-color: var(--bg-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-primary);
        }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .admin-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .admin-list-item {
            background-color: var(--bg-primary);
            padding: 16px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .admin-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-electric));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .admin-user-details h4 {
            font-size: 15px;
            margin-bottom: 2px;
        }

        .admin-user-details .role-badge {
            font-size: 11px;
        }

        .admin-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-edit {
            background-color: rgba(59, 130, 246, 0.2);
            color: var(--accent-blue);
        }

        .btn-delete {
            background-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .btn-small:hover {
            opacity: 0.8;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.open .modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
        }

        /* Footer */
        .footer {
            background-color: var(--bg-card);
            margin-top: 40px;
            padding: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-section {
            margin-bottom: 24px;
        }

        .footer-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .online-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .online-user {
            padding: 6px 12px;
            background-color: var(--bg-primary);
            border-radius: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .online-indicator {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .last-messages {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .last-message-item {
            background-color: var(--bg-primary);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .last-message-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .last-message-topic {
            color: var(--accent-electric);
            margin-bottom: 4px;
        }

        .last-message-meta {
            color: var(--text-muted);
            font-size: 12px;
        }

        /* Hide/Show */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .profile-stats {
                grid-template-columns: 1fr;
            }
            
            .profile-info-grid {
                grid-template-columns: 1fr;
            }
            
            .post {
                flex-direction: column;
            }
            
            .admin-tabs {
                flex-wrap: nowrap;
                overflow-x: auto;
            }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: var(--bg-card);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-left: 4px solid #10b981;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="menu-btn" onclick="toggleSideMenu()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        
        <div class="logo">
            <img src="/mnt/kimi/upload/IMG_9738.png" alt="NEO RP">
        </div>
        
        <div class="header-right" id="headerRight">
            <button class="header-icon" onclick="showAuth('login')">
                <i class="fas fa-sign-in-alt"></i>
            </button>
            <button class="header-icon" onclick="showAuth('register')">
                <i class="fas fa-user-plus"></i>
            </button>
        </div>
    </header>

    <!-- Side Menu -->
    <div class="side-menu-overlay" onclick="toggleSideMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <div class="side-menu-header">
            <div class="side-menu-user-avatar" id="sideMenuAvatar">
                <i class="fas fa-user"></i>
            </div>
            <div class="side-menu-user-info">
                <h3 id="sideMenuUsername">Mehmon</h3>
                <span class="role-badge" id="sideMenuRole">Foydalanuvchi</span>
            </div>
        </div>
        <nav class="side-menu-nav">
            <a class="side-menu-item" onclick="showMainPage(); toggleSideMenu();">
                <i class="fas fa-home"></i>
                Bosh sahifa
            </a>
            <a class="side-menu-item hidden" id="profileMenuItem" onclick="showProfile(); toggleSideMenu();">
                <i class="fas fa-user"></i>
                Profil
            </a>
            <a class="side-menu-item hidden" id="adminMenuItem" onclick="showAdminPanel(); toggleSideMenu();">
                <i class="fas fa-cog"></i>
                Admin panel
            </a>
            <a class="side-menu-item" onclick="toggleSideMenu();">
                <i class="fas fa-users"></i>
                Foydalanuvchilar
            </a>
            <a class="side-menu-item hidden" id="logoutMenuItem" onclick="logout(); toggleSideMenu();">
                <i class="fas fa-sign-out-alt"></i>
                Chiqish
            </a>
        </nav>
    </div>

    <!-- Main Container -->
    <main class="container" id="mainContainer">
        <!-- Content will be loaded here -->
    </main>

    <!-- Footer -->
    <footer class="footer hidden" id="footer">
        <div class="footer-section">
            <div class="footer-title">Loyiha jamoasi onlayn</div>
            <div class="online-list" id="teamOnline">
                <!-- Team members will be loaded here -->
            </div>
        </div>
        
        <div class="footer-section">
            <div class="footer-title">Onlayn foydalanuvchilar</div>
            <div class="online-list" id="usersOnline">
                <!-- Online users will be loaded here -->
            </div>
        </div>
        
        <div class="footer-section">
            <div class="footer-title">Oxirgi xabarlar</div>
            <div class="last-messages" id="lastMessages">
                <!-- Last messages will be loaded here -->
            </div>
        </div>
    </footer>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Sarlavha</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalContent">
                <!-- Modal content -->
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // Data Storage
        let currentUser = null;
        let users = JSON.parse(localStorage.getItem('users')) || [];
        let categories = JSON.parse(localStorage.getItem('categories')) || [
            {
                id: 1,
                name: "Asosiy bo'lim",
                order: 1,
                forums: [
                    {
                        id: 1,
                        name: "Yangiliklar va E'lonlar",
                        description: "Server yangiliklari va muhim e'lonlar",
                        topics: 0,
                        lastPost: null
                    },
                    {
                        id: 2,
                        name: "Umumiy suhbat",
                        description: "Erkin mavzularda suhbatlashish",
                        topics: 0,
                        lastPost: null
                    }
                ]
            },
            {
                id: 2,
                name: "Yordam va Qo'llab-quvvatlash",
                order: 2,
                forums: [
                    {
                        id: 3,
                        name: "Texnik yordam",
                        description: "Texnik muammolar va yechimlar",
                        topics: 0,
                        lastPost: null
                    }
                ]
            }
        ];
        
        let topics = JSON.parse(localStorage.getItem('topics')) || [];
        let posts = JSON.parse(localStorage.getItem('posts')) || [];
        let admins = JSON.parse(localStorage.getItem('admins')) || [];

        // Role Definitions
        const roles = [
            { id: 'helper', name: 'Helper', color: '#8b5cf6', level: 1 },
            { id: 'kichik-mod', name: 'Kichik moderator', color: '#06b6d4', level: 2 },
            { id: 'moderator', name: 'Moderator', color: '#10b981', level: 3 },
            { id: 'katta-mod', name: 'Katta moderator', color: '#f59e0b', level: 4 },
            { id: 'admin', name: 'Adminstrator', color: '#ef4444', level: 5 },
            { id: 'davlat-nazorat', name: "Davlat Tashkilotlari nazoratchisi", color: '#60a5fa', level: 6 },
            { id: 'jinoiy-nazorat', name: "Jinoiy guruhlar nazoratchisi", color: '#fb923c', level: 6 },
            { id: 'helper-nazorat', name: "Helperlar nazoratchisi", color: '#22d3ee', level: 7 },
            { id: 'bosh-nazorat-orni', name: "Bosh nazoratchining o'rinbosari", color: '#f87171', level: 8 },
            { id: 'bosh-nazorat', name: "Bosh nazoratchi", color: '#fca5a5', level: 9 },
            { id: 'texnik-admin', name: "Texnik admin", color: '#818cf8', level: 10 },
            { id: 'admin-kurator', name: "Adminlar kuratori", color: '#f472b6', level: 11 },
            { id: 'bosh-admin-orni', name: "Bosh admin o'rinbosari", color: '#fb7185', level: 12 },
            { id: 'bosh-admin', name: "Bosh admin", color: '#fda4af', level: 13 },
            { id: 'dasturchi', name: "Dasturchi", color: '#f9a8d4', level: 14 },
            { id: 'loyiha-jamoa', name: "Loyiha jamoasi", color: '#5eead4', level: 15 },
            { id: 'asoschi-orni', name: "Asoschi o'rinbosari", color: '#fdba74', level: 16 },
            { id: 'asoschi', name: "Asoschi", color: '#f87171', level: 17 }
        ];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Create default admin if none exists
            if (users.length === 0) {
                const defaultAdmin = {
                    id: Date.now(),
                    username: 'Fayoz_Sobirjonov',
                    password: 'admin123',
                    email: 'admin@neorp.uz',
                    role: 'asoschi',
                    avatar: null,
                    registeredAt: new Date().toISOString(),
                    lastOnline: new Date().toISOString(),
                    isOnline: true
                };
                users.push(defaultAdmin);
                localStorage.setItem('users', JSON.stringify(users));
            }
            
            checkAuth();
            showMainPage();
            updateFooter();
        });

        // Auth Functions
        function showAuth(type) {
            const container = document.getElementById('mainContainer');
            
            if (type === 'login') {
                container.innerHTML = `
                    <div class="auth-container">
                        <div class="auth-logo">
                            <img src="/mnt/kimi/upload/IMG_9738.png" alt="NEO RP">
                        </div>
                        <h2 class="auth-title">Tizimga kirish</h2>
                        <form onsubmit="handleLogin(event)">
                            <div class="form-group">
                                <label>Foydalanuvchi nomi</label>
                                <input type="text" id="loginUsername" required>
                            </div>
                            <div class="form-group">
                                <label>Parol</label>
                                <input type="password" id="loginPassword" required>
                            </div>
                            <button type="submit" class="btn">Kirish</button>
                        </form>
                        <div class="auth-switch">
                            Akkauntingiz yo'qmi? <a onclick="showAuth('register')">Ro'yxatdan o'tish</a>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="auth-container">
                        <div class="auth-logo">
                            <img src="/mnt/kimi/upload/IMG_9738.png" alt="NEO RP">
                        </div>
                        <h2 class="auth-title">Ro'yxatdan o'tish</h2>
                        <form onsubmit="handleRegister(event)">
                            <div class="form-group">
                                <label>Foydalanuvchi nomi</label>
                                <input type="text" id="regUsername" required>
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="regEmail" required>
                            </div>
                            <div class="form-group">
                                <label>Parol</label>
                                <input type="password" id="regPassword" required>
                            </div>
                            <div class="form-group">
                                <label>Parolni tasdiqlash</label>
                                <input type="password" id="regPasswordConfirm" required>
                            </div>
                            <button type="submit" class="btn">Ro'yxatdan o'tish</button>
                        </form>
                        <div class="auth-switch">
                            Akkauntingiz bormi? <a onclick="showAuth('login')">Tizimga kirish</a>
                        </div>
                    </div>
                `;
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                user.isOnline = true;
                user.lastOnline = new Date().toISOString();
                localStorage.setItem('users', JSON.stringify(users));
                
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                showToast('Tizimga muvaffaqiyatli kirdingiz!', 'success');
                checkAuth();
                showMainPage();
            } else {
                showToast('Foydalanuvchi nomi yoki parol noto\'g\'ri!', 'error');
            }
        }

        function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;
            
            if (password !== passwordConfirm) {
                showToast('Parollar mos kelmadi!', 'error');
                return;
            }
            
            if (users.find(u => u.username === username)) {
                showToast('Bu foydalanuvchi nomi band!', 'error');
                return;
            }
            
            const newUser = {
                id: Date.now(),
                username,
                email,
                password,
                role: 'user',
                avatar: null,
                registeredAt: new Date().toISOString(),
                lastOnline: new Date().toISOString(),
                isOnline: true
            };
            
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            currentUser = newUser;
            localStorage.setItem('currentUser', JSON.stringify(newUser));
            
            showToast('Ro\'yxatdan muvaffaqiyatli o\'tdingiz!', 'success');
            checkAuth();
            showMainPage();
        }

        function logout() {
            if (currentUser) {
                const userIndex = users.findIndex(u => u.id === currentUser.id);
                if (userIndex !== -1) {
                    users[userIndex].isOnline = false;
                    users[userIndex].lastOnline = new Date().toISOString();
                    localStorage.setItem('users', JSON.stringify(users));
                }
            }
            
            currentUser = null;
            localStorage.removeItem('currentUser');
            checkAuth();
            showMainPage();
            showToast('Tizimdan chiqdingiz', 'success');
        }

        function checkAuth() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                
                // Update UI for logged in user
                document.getElementById('sideMenuUsername').textContent = currentUser.username;
                document.getElementById('sideMenuRole').textContent = getRoleName(currentUser.role);
                document.getElementById('sideMenuRole').className = 'role-badge role-' + currentUser.role;
                
                if (currentUser.avatar) {
                    document.getElementById('sideMenuAvatar').innerHTML = `<img src="${currentUser.avatar}" alt="Avatar">`;
                }
                
                document.getElementById('profileMenuItem').classList.remove('hidden');
                document.getElementById('logoutMenuItem').classList.remove('hidden');
                
                // Show admin panel if user is admin
                if (isAdmin(currentUser.role)) {
                    document.getElementById('adminMenuItem').classList.remove('hidden');
                }
                
                // Update header
                document.getElementById('headerRight').innerHTML = `
                    <button class="header-icon" onclick="showProfile()">
                        <i class="fas fa-user"></i>
                    </button>
                    <button class="header-icon" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                `;
                
                document.getElementById('footer').classList.remove('hidden');
            } else {
                document.getElementById('sideMenuUsername').textContent = 'Mehmon';
                document.getElementById('sideMenuRole').textContent = 'Foydalanuvchi';
                document.getElementById('sideMenuRole').className = 'role-badge';
                document.getElementById('sideMenuAvatar').innerHTML = '<i class="fas fa-user"></i>';
                
                document.getElementById('profileMenuItem').classList.add('hidden');
                document.getElementById('adminMenuItem').classList.add('hidden');
                document.getElementById('logoutMenuItem').classList.add('hidden');
                
                document.getElementById('headerRight').innerHTML = `
                    <button class="header-icon" onclick="showAuth('login')">
                        <i class="fas fa-sign-in-alt"></i>
                    </button>
                    <button class="header-icon" onclick="showAuth('register')">
                        <i class="fas fa-user-plus"></i>
                    </button>
                `;
                
                document.getElementById('footer').classList.add('hidden');
            }
        }

        // Helper Functions
        function getRoleName(roleId) {
            const role = roles.find(r => r.id === roleId);
            return role ? role.name : 'Foydalanuvchi';
        }

        function isAdmin(role) {
            const adminRoles = ['helper', 'kichik-mod', 'moderator', 'katta-mod', 'admin', 'davlat-nazorat', 
                'jinoiy-nazorat', 'helper-nazorat', 'bosh-nazorat-orni', 'bosh-nazorat', 'texnik-admin',
                'admin-kurator', 'bosh-admin-orni', 'bosh-admin', 'dasturchi', 'loyiha-jamoa', 'asoschi-orni', 'asoschi'];
            return adminRoles.includes(role);
        }

        function getRoleLevel(roleId) {
            const role = roles.find(r => r.id === roleId);
            return role ? role.level : 0;
        }

        function canManageRole(userRole, targetRole) {
            return getRoleLevel(userRole) > getRoleLevel(targetRole);
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function toggleSideMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
            document.querySelector('.side-menu-overlay').classList.toggle('open');
        }

        // Main Page
        function showMainPage() {
            const container = document.getElementById('mainContainer');
            let html = '';
            
            categories.forEach(category => {
                html += `
                    <section class="category-section">
                        <div class="category-header">
                            <h2 class="category-title">${category.name}</h2>
                            ${currentUser && isAdmin(currentUser.role) ? `
                                <div class="category-actions">
                                    <button class="icon-btn" onclick="editCategory(${category.id})">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="icon-btn" onclick="deleteCategory(${category.id})">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                    <button class="icon-btn" onclick="showAddForumModal(${category.id})">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                `;
                
                category.forums.forEach(forum => {
                    const forumTopics = topics.filter(t => t.forumId === forum.id);
                    const lastPost = forumTopics.length > 0 ? 
                        posts.filter(p => p.topicId === forumTopics[forumTopics.length - 1].id).pop() : null;
                    
                    html += `
                        <article class="forum-card" onclick="showForum(${forum.id})">
                            <div class="forum-card-header">
                                <div class="forum-icon">
                                    <i class="far fa-comment-dots"></i>
                                </div>
                                <div class="forum-title-section">
                                    <div class="forum-title">${forum.name}</div>
                                    <div class="forum-meta">Mavzular: <span>${forumTopics.length}</span></div>
                                </div>
                            </div>
                            ${lastPost ? `
                                <div class="last-post-preview">
                                    <div class="last-post-title">${lastPost.content.substring(0, 50)}...</div>
                                    <div class="last-post-meta">
                                        <span>${formatTime(lastPost.createdAt)}</span>
                                        <span>•</span>
                                        <span style="color: ${getRoleColor(lastPost.authorRole)}">${lastPost.author}</span>
                                    </div>
                                </div>
                            ` : '<div class="last-post-preview"><div class="last-post-title">Hali xabar yo\'q</div></div>'}
                        </article>
                    `;
                });
                
                html += '</section>';
            });
            
            if (currentUser && isAdmin(currentUser.role)) {
                html += `
                    <button class="btn" style="margin-top: 20px;" onclick="showAddCategoryModal()">
                        <i class="fas fa-plus"></i> Yangi kategoriya qo'shish
                    </button>
                `;
            }
            
            container.innerHTML = html;
        }

        function getRoleColor(roleId) {
            const role = roles.find(r => r.id === roleId);
            return role ? role.color : '#9ca3af';
        }

        function formatTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            
            if (diff < 60) return 'Hozirgina';
            if (diff < 3600) return Math.floor(diff / 60) + ' daqiqa oldin';
            if (diff < 86400) return Math.floor(diff / 3600) + ' soat oldin';
            if (diff < 604800) return Math.floor(diff / 86400) + ' kun oldin';
            return date.toLocaleDateString('uz-UZ');
        }

        function renderReactions(post) {
            const reactions = post.reactions || {};
            const userReaction = currentUser ? reactions[currentUser.username] : null;
            
            const emojis = ['👍', '❤️', '😂', '😮', '👏'];
            let html = '';
            
            emojis.forEach(emoji => {
                const count = Object.values(reactions).filter(r => r === emoji).length;
                const isActive = userReaction === emoji;
                
                html += `
                    <div class="reaction ${isActive ? 'active' : ''}" onclick="toggleReaction(${post.id}, '${emoji}')">
                        ${emoji} ${count > 0 ? count : ''}
                    </div>
                `;
            });
            
            return html;
        }

        function toggleReaction(postId, emoji) {
            if (!currentUser) {
                showToast('Reaksiya qoldirish uchun tizimga kiring!', 'error');
                return;
            }
            
            const post = posts.find(p => p.id === postId);
            if (!post.reactions) post.reactions = {};
            
            if (post.reactions[currentUser.username] === emoji) {
                delete post.reactions[currentUser.username];
            } else {
                post.reactions[currentUser.username] = emoji;
            }
            
            localStorage.setItem('posts', JSON.stringify(posts));
            showTopic(post.topicId);
        }

        function addPost(topicId) {
            const content = document.getElementById('replyContent').value.trim();
            if (!content) return;
            
            const newPost = {
                id: Date.now(),
                topicId,
                author: currentUser.username,
                authorRole: currentUser.role,
                content,
                createdAt: new Date().toISOString(),
                reactions: {}
            };
            
            posts.push(newPost);
            localStorage.setItem('posts', JSON.stringify(posts));
            
            // Update last post
            const topic = topics.find(t => t.id === topicId);
            const forum = categories.flatMap(c => c.forums).find(f => f.id === topic.forumId);
            forum.lastPost = newPost;
            localStorage.setItem('categories', JSON.stringify(categories));
            
            showToast('Xabar yuborildi!', 'success');
            showTopic(topicId);
            updateFooter();
        }

        function deletePost(postId) {
            if (!confirm('Xabarni o\'chirishni xohlaysizmi?')) return;
            
            const postIndex = posts.findIndex(p => p.id === postId);
            if (postIndex > -1) {
                const topicId = posts[postIndex].topicId;
                posts.splice(postIndex, 1);
                localStorage.setItem('posts', JSON.stringify(posts));
                showToast('Xabar o\'chirildi', 'success');
                showTopic(topicId);
                updateFooter();
            }
        }

        function uploadAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                currentUser.avatar = e.target.result;
                
                const userIndex = users.findIndex(u => u.id === currentUser.id);
                users[userIndex].avatar = e.target.result;
                
                localStorage.setItem('users', JSON.stringify(users));
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                showToast('Avatar yangilandi!', 'success');
                showProfile();
                checkAuth();

            reader.readAsDataURL(file);

        function assignRole(userId, roleId) {
            if (!roleId) return;
            
            const user = users.find(u => u.id === userId);
            const targetRole = roles.find(r => r.id === roleId);
            
            if (!canManageRole(currentUser.role, user.role) || !canManageRole(currentUser.role, roleId)) {
                showToast('Bu rolni tayinlash uchun ruxsatingiz yo\'q!', 'error');

            user.role = roleId;
            localStorage.setItem('users', JSON.stringify(users));
            
            if (currentUser.id === userId) {
                currentUser.role = roleId;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                checkAuth();

            showToast(`${user.username} ga ${targetRole.name} roli tayinlandi!`, 'success');

        function editCategory(id) {
            const cat = categories.find(c => c.id === id);
            document.getElementById('modalTitle').textContent = "Kategoriyani tahrirlash";
            document.getElementById('modalContent').innerHTML = `
                <div class="form-group">
                    <label>Kategoriya nomi</label>
                    <input type="text" id="editCategoryName" value="${cat.name}">
                </div>
                <button class="btn" onclick="saveCategoryEdit(${id})">Saqlash</button>
            `;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function saveCategoryEdit(id) {
            const name = document.getElementById('editCategoryName').value.trim();
            if (!name) return;
            
            const cat = categories.find(c => c.id === id);
            cat.name = name;
            
            localStorage.setItem('categories', JSON.stringify(categories));
            closeModal();
            showToast('Kategoriya yangilandi!', 'success');
            showAdminPanel();
        }

        function deleteCategory(id) {
            if (!confirm('Kategoriyani o\'chirishni xohlaysizmi?')) return;
            
            categories = categories.filter(c => c.id !== id);
            localStorage.setItem('categories', JSON.stringify(categories));
            showToast('Kategoriya o\'chirildi', 'success');
            showAdminPanel();
        }

        // Forum Management
        function showAddForumModal(categoryId) {
            document.getElementById('modalTitle').textContent = "Yangi bo'lim qo'shish";
            document.getElementById('modalContent').innerHTML = `
                <div class="form-group">
                    <label>Bo'lim nomi</label>
                    <input type="text" id="newForumName" placeholder="Masalan: Umumiy suhbat">
                </div>
                <div class="form-group">
                    <label>Tavsif</label>
                    <textarea id="newForumDesc" placeholder="Bo'lim haqida qisqacha..."></textarea>
                </div>
                <button class="btn" onclick="addForum(${categoryId})">Qo'shish</button>
            `;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function addForum(categoryId) {
            const name = document.getElementById('newForumName').value.trim();
            const desc = document.getElementById('newForumDesc').value.trim();
            
            if (!name) return;
            
            const cat = categories.find(c => c.id === categoryId);
            cat.forums.push({
                id: Date.now(),
                name,
                description: desc,
                topics: 0,
                lastPost: null
            });
            
            localStorage.setItem('categories', JSON.stringify(categories));
            closeModal();
            showToast('Bo\'lim qo\'shildi!', 'success');
            showMainPage();
        }

        // Topic Management
        function showAddTopicModal(forumId) {
            if (!currentUser) {
                showToast('Mavzu yaratish uchun tizimga kiring!', 'error');
                return;
            }
            
            document.getElementById('modalTitle').textContent = "Yangi mavzu yaratish";
            document.getElementById('modalContent').innerHTML = `
                <div class="form-group">
                    <label>Mavzu sarlavhasi</label>
                    <input type="text" id="newTopicTitle" placeholder="Sarlavha...">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="newTopicStatus">
                        <option value="ochiq">Ochiq</option>
                        <option value="yopiq">Yopiq</option>
                        <option value="muhim">Muhim</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Birinchi xabar</label>
                    <textarea id="newTopicContent" rows="4" placeholder="Xabaringiz..."></textarea>
                </div>
                <button class="btn" onclick="addTopic(${forumId})">Yaratish</button>
            `;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function addTopic(forumId) {
            const title = document.getElementById('newTopicTitle').value.trim();
            const status = document.getElementById('newTopicStatus').value;
            const content = document.getElementById('newTopicContent').value.trim();
            
            if (!title || !content) return;
            
            const newTopic = {
                id: Date.now(),
                forumId,
                title,
                status,
                author: currentUser.username,
                authorRole: currentUser.role,
                createdAt: new Date().toISOString(),
                views: 0,
                isImportant: status === 'muhim'
            };
            
            topics.push(newTopic);
            localStorage.setItem('topics', JSON.stringify(topics));
            
            const newPost = {
                id: Date.now(),
                topicId: newTopic.id,
                author: currentUser.username,
                authorRole: currentUser.role,
                content,
                createdAt: new Date().toISOString(),
                reactions: {}
            };
            
            posts.push(newPost);
            localStorage.setItem('posts', JSON.stringify(posts));
            
            closeModal();
            showToast('Mavzu yaratildi!', 'success');
            showForum(forumId);
            updateFooter();
        }

        function editTopic(id) {
            const topic = topics.find(t => t.id === id);
            document.getElementById('modalTitle').textContent = "Mavzuni tahrirlash";
            document.getElementById('modalContent').innerHTML = `
                <div class="form-group">
                    <label>Sarlavha</label>
                    <input type="text" id="editTopicTitle" value="${topic.title}">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="editTopicStatus">
                        <option value="ochiq" ${topic.status === 'ochiq' ? 'selected' : ''}>Ochiq</option>
                        <option value="yopiq" ${topic.status === 'yopiq' ? 'selected' : ''}>Yopiq</option>
                        <option value="muhim" ${topic.status === 'muhim' ? 'selected' : ''}>Muhim</option>
                        <option value="rad-etildi" ${topic.status === 'rad-etildi' ? 'selected' : ''}>Rad etildi</option>
                    </select>
                </div>
                <button class="btn" onclick="saveTopicEdit(${id})">Saqlash</button>
            `;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function saveTopicEdit(id) {
            const title = document.getElementById('editTopicTitle').value.trim();
            const status = document.getElementById('editTopicStatus').value;
            
            if (!title) return;
            
            const topic = topics.find(t => t.id === id);
            topic.title = title;
            topic.status = status;
            topic.isImportant = status === 'muhim';
            
            localStorage.setItem('topics', JSON.stringify(topics));
            closeModal();
            showToast('Mavzu yangilandi!', 'success');
            showTopic(id);
        }

        function deleteTopic(id) {
            if (!confirm('Mavzuni o\'chirishni xohlaysizmi?')) return;
            
            topics = topics.filter(t => t.id !== id);
            posts = posts.filter(p => p.topicId !== id);
            
            localStorage.setItem('topics', JSON.stringify(topics));
            localStorage.setItem('posts', JSON.stringify(posts));
            
            showToast('Mavzu o\'chirildi', 'success');
            showMainPage();
            updateFooter();
        }

        function changeTopicStatus(id, status) {
            const topic = topics.find(t => t.id === id);
            topic.status = status;
            topic.isImportant = status === 'muhim';
            localStorage.setItem('topics', JSON.stringify(topics));
            showToast('Status yangilandi!', 'success');
        }

        // Modal Functions
        function closeModal(event) {
            if (!event || event.target === document.getElementById('modalOverlay')) {
                document.getElementById('modalOverlay').classList.remove('open');
            }
        }

        // Footer
        function updateFooter() {
            // Team online (high level admins)
            const teamRoles = ['asoschi', 'asoschi-orni', 'dasturchi'];
            const teamOnline = users.filter(u => u.isOnline && teamRoles.includes(u.role));
            
            const teamContainer = document.getElementById('teamOnline');
            if (teamContainer) {
                if (teamOnline.length === 0) {
                    teamContainer.innerHTML = '<span style="color: var(--text-muted);">Hozircha yo\'q</span>';
                } else {
                    teamContainer.innerHTML = teamOnline.map(u => {
                        const role = roles.find(r => r.id === u.role);
                        return `<span class="online-user" style="color: ${role ? role.color : 'white'}">${u.username}</span>`;
                    }).join('');
                }
            }
            
            // Users online
            const regularOnline = users.filter(u => u.isOnline && !teamRoles.includes(u.role));
            const usersContainer = document.getElementById('usersOnline');
            if (usersContainer) {
                if (regularOnline.length === 0) {
                    usersContainer.innerHTML = '<span style="color: var(--text-muted);">Hozircha yo\'q</span>';
                } else {
                    usersContainer.innerHTML = regularOnline.map(u => {
                        const role = roles.find(r => r.id === u.role);
                        return `<span class="online-user" style="color: ${role ? role.color : 'white'}">${u.username}</span>`;
                    }).join('');
                }
            }
            
            // Last messages
            const lastPosts = posts.slice(-5).reverse();
            const messagesContainer = document.getElementById('lastMessages');
            if (messagesContainer) {
                if (lastPosts.length === 0) {
                    messagesContainer.innerHTML = '<span style="color: var(--text-muted);">Hali xabar yo\'q</span>';
                } else {
                    messagesContainer.innerHTML = lastPosts.map(p => {
                        const topic = topics.find(t => t.id === p.topicId);
                        return `
                            <div class="last-message-item" onclick="showTopic(${p.topicId})">
                                <div class="last-message-topic">${topic ? topic.title : 'Noma\'lum mavzu'}</div>
                                <div class="last-message-meta">
                                    <span style="color: ${getRoleColor(p.authorRole)}">${p.author}</span> • 
                                    ${formatTime(p.createdAt)}
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            }
        }

        // Check URL hash for direct links
        window.addEventListener('hashchange', handleHash);
        
        function handleHash() {
            const hash = window.location.hash;
            if (hash.startsWith('#post-')) {
                const postId = parseInt(hash.replace('#post-', ''));
                const post = posts.find(p => p.id === postId);
                if (post) {
                    showTopic(post.topicId);
                    setTimeout(() => {
                        const element = document.getElementById(`post-${postId}`);
                        if (element) element.scrollIntoView({ behavior: 'smooth' });
                    }, 100);
                }
            }
        }
    </script>
</body>
</html>
